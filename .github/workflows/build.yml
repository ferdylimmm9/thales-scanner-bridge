name: build

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  compile:
    # Real Windows build against the real SDK wrapper — this is what actually
    # catches SDK API drift, not a stub. Requires two repo secrets,
    # MMM_READER_DOTNET_DLL_B64_1 and _2: MMMReaderDotNet50.dll gzip'd then
    # base64'd then split in half (GitHub secrets cap out at 64 KB; the raw
    # base64 of this DLL is ~215 KB, gzip'd base64 is ~85 KB — still too big
    # for one secret, so it's split across two and concatenated here):
    #   gzip -9 -c MMMReaderDotNet50.dll | base64 > dll.b64
    #   split -n 2 dll.b64 part_   # -> part_aa, part_ab
    # The DLL itself is never committed — only reconstructed transiently in
    # the runner. GitHub Actions doesn't expose repo secrets to workflows
    # triggered by forked-repo pull requests, so this only runs for
    # same-repo branches/PRs; that's an accepted limitation, not a bug.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Decode SDK wrapper DLL
        shell: pwsh
        env:
          DLL_B64_1: ${{ secrets.MMM_READER_DOTNET_DLL_B64_1 }}
          DLL_B64_2: ${{ secrets.MMM_READER_DOTNET_DLL_B64_2 }}
        run: |
          if (-not $env:DLL_B64_1 -or -not $env:DLL_B64_2) {
            Write-Error "MMM_READER_DOTNET_DLL_B64_1/_2 secrets are not set — see this job's comment for how to generate them."
            exit 1
          }
          New-Item -ItemType Directory -Force ThalesBridge/libs | Out-Null
          $gzBytes = [Convert]::FromBase64String($env:DLL_B64_1 + $env:DLL_B64_2)
          $gzStream = New-Object IO.MemoryStream(, $gzBytes)
          $outStream = [IO.File]::Create("ThalesBridge/libs/MMMReaderDotNet50.dll")
          $gunzip = New-Object IO.Compression.GZipStream($gzStream, [IO.Compression.CompressionMode]::Decompress)
          $gunzip.CopyTo($outStream)
          $gunzip.Dispose()
          $outStream.Dispose()

      - name: Build
        run: dotnet build ThalesBridge -c Release

  scripts:
    # These scripts are invoked two incompatible ways, and BOTH must work:
    #
    #   powershell -File setup.ps1        -> reads the FILE. 5.1 assumes CP1252
    #                                        for a BOM-less file, so non-ASCII
    #                                        needs a BOM or it is mangled.
    #   irm .../install.ps1 | iex         -> reads a STRING. A BOM decodes to a
    #                                        leading U+FEFF that iex chokes on,
    #                                        breaking the opening <# comment.
    #
    # Requiring a BOM fixes the first and breaks the second (that shipped: v1.2.1
    # made `irm | iex` fail with "Missing opening '(' after keyword 'for'").
    # The only config satisfying both is ASCII-only with NO BOM: then CP1252 and
    # UTF-8 are byte-identical and there is nothing to mangle or strip.
    #
    # So: no non-ASCII in .ps1 files. Put em dashes in the README, not here.
    # Lint with 5.1 itself (`shell: powershell`, never `pwsh` -- 7 always reads
    # UTF-8 and cannot see this class of bug at all).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Keep this run block strictly ASCII too: Actions writes it to a temp .ps1
      # with no BOM, so a stray em dash here dies the same way. (The first
      # version of this job did exactly that.)
      - name: ASCII + no-BOM + parse check under Windows PowerShell 5.1
        shell: powershell
        run: |
          $bad = 0
          foreach ($f in Get-ChildItem -Path $PWD -Filter *.ps1) {
            $bytes = [IO.File]::ReadAllBytes($f.FullName)

            if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
              Write-Host "FAIL $($f.Name): has a UTF-8 BOM. 'irm | iex' would see a leading U+FEFF and fail to parse."
              $bad = 1
              continue
            }
            $nonAscii = $bytes | Where-Object { $_ -gt 0x7F }
            if ($nonAscii) {
              Write-Host "FAIL $($f.Name): contains non-ASCII bytes. Without a BOM 5.1 decodes those as CP1252 and the file will not parse. Use ASCII."
              $bad = 1
              continue
            }

            # Path 1: powershell -File (parses the file on disk)
            $e1 = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$null, [ref]$e1) | Out-Null
            if ($e1) {
              foreach ($e in $e1) { Write-Host "FAIL $($f.Name):$($e.Extent.StartLineNumber) (-File) $($e.Message)" }
              $bad = 1
              continue
            }

            # Path 2: irm | iex (parses the downloaded body as a string)
            $text = [IO.File]::ReadAllText($f.FullName)
            $e2 = $null
            [System.Management.Automation.Language.Parser]::ParseInput($text, [ref]$null, [ref]$e2) | Out-Null
            if ($e2) {
              foreach ($e in $e2) { Write-Host "FAIL $($f.Name):$($e.Extent.StartLineNumber) (irm|iex) $($e.Message)" }
              $bad = 1
              continue
            }

            Write-Host "OK   $($f.Name) (ascii, no bom, parses as -File and as irm|iex)"
          }
          exit $bad

  install-smoke:
    # Run the documented client-side commands the way a kiosk operator actually
    # runs them: from cmd.exe, via `powershell -File`, i.e. Windows PowerShell
    # 5.1. The runner has no Thales SDK and no reader, so a full install cannot
    # complete -- but everything up to the SDK gate must run cleanly, and that
    # is where all four 5.1 install defects lived. A parse error or a
    # NativeCommandError here means the installer is broken on a real kiosk.
    #
    # As above: keep these run blocks ASCII-only.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup.ps1 reaches the SDK gate without a PowerShell error
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -File setup.ps1 > out.txt 2>&1
          echo ---- exit=%ERRORLEVEL% ----
          type out.txt
          findstr /C:"ParserError" out.txt >nul && (echo SMOKE FAIL: script did not parse under 5.1 & exit /b 1)
          findstr /C:"missing the terminator" out.txt >nul && (echo SMOKE FAIL: encoding/BOM regression & exit /b 1)
          findstr /C:"NativeCommandError" out.txt >nul && (echo SMOKE FAIL: native stderr promoted to terminating & exit /b 1)
          findstr /C:"Thales SDK not installed" out.txt >nul || (echo SMOKE FAIL: did not reach the SDK gate & exit /b 1)
          echo SMOKE OK: reached the SDK gate cleanly
          exit /b 0

      - name: setup.ps1 -Doctor runs without a PowerShell error
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -File setup.ps1 -Doctor > doc.txt 2>&1
          echo ---- exit=%ERRORLEVEL% ----
          type doc.txt
          findstr /C:"ParserError" doc.txt >nul && (echo SMOKE FAIL: parser error & exit /b 1)
          findstr /C:"NativeCommandError" doc.txt >nul && (echo SMOKE FAIL: NativeCommandError & exit /b 1)
          findstr /C:"diagnostic report" doc.txt >nul || (echo SMOKE FAIL: doctor did not run & exit /b 1)
          echo SMOKE OK: doctor ran and reported
          exit /b 0

      - name: uninstall.ps1 is clean-machine safe (must exit 0 on a bare PC)
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -File uninstall.ps1 > un.txt 2>&1
          set RC=%ERRORLEVEL%
          echo ---- exit=%RC% ----
          type un.txt
          findstr /C:"ParserError" un.txt >nul && (echo SMOKE FAIL: parser error & exit /b 1)
          findstr /C:"NativeCommandError" un.txt >nul && (echo SMOKE FAIL: NativeCommandError & exit /b 1)
          if not "%RC%"=="0" (echo SMOKE FAIL: uninstall errored on an already-clean machine & exit /b 1)
          echo SMOKE OK: uninstall completed on a clean machine
          exit /b 0
