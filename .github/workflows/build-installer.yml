name: Build Windows installer

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build self-contained Windows installer
        shell: bash
        run: ./build-release.sh "0.0.0-ci.${GITHUB_RUN_NUMBER}"

      - name: Verify release files
        shell: bash
        run: |
          test -s ThalesBridgeSetup.exe
          test -s publish.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ThalesBridgeSetup-${{ github.run_number }}
          path: |
            ThalesBridgeSetup.exe
            publish.zip
          if-no-files-found: error
          retention-days: 14
